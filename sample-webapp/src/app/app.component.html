<mat-sidenav-container fullscreen class="shell">
  <mat-sidenav #sidenav class="custom-drawer-inner-container">
    <mat-nav-list (click)="sidenav.close()">
      <div class="drawer-brand">
        <p class="drawer-kicker">IRIS Workshop</p>
        <h2>Interop Guide</h2>
      </div>

      <a mat-list-item routerLink="/guide" *ngIf="auth.getIsLoggedIn()">
        <mat-icon matListItemIcon>map</mat-icon>
        <span matListItemTitle>Workshop Guide</span>
      </a>

      <a mat-list-item routerLink="/loan" *ngIf="auth.getIsLoggedIn()">
        <mat-icon matListItemIcon>account_balance</mat-icon>
        <span matListItemTitle>Loan Lab</span>
      </a>

      <a mat-list-item routerLink="/create-order" *ngIf="auth.getIsLoggedIn()">
        <mat-icon matListItemIcon>shopping_cart</mat-icon>
        <span matListItemTitle>Create Order</span>
      </a>

      <a mat-list-item routerLink="/login" *ngIf="!auth.getIsLoggedIn()">
        <mat-icon matListItemIcon>login</mat-icon>
        <span matListItemTitle>Login</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="topbar">
      <button class="menu-button" mat-icon-button (click)="sidenav.open('mouse')">
        <mat-icon>menu</mat-icon>
      </button>

      <a class="brand-block" routerLink="/guide">
        <span class="brand-kicker">InterSystems IRIS</span>
        <span class="brand-title">Workshop Interop</span>
      </a>

      <nav class="top-links" *ngIf="auth.getIsLoggedIn()">
        <a routerLink="/guide" routerLinkActive="active-link">Guide</a>
        <a routerLink="/loan" routerLinkActive="active-link">Loan Lab</a>
        <a routerLink="/create-order" routerLinkActive="active-link">Order Form</a>
      </nav>

      <span class="fill-space"></span>

      <button *ngIf="auth.getIsLoggedIn()" mat-icon-button [matMenuTriggerFor]="userMenu" class="user-button">
        <mat-icon>account_circle</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu">
        <div class="user-menu-header" *ngIf="auth.getIsLoggedIn()">
          <strong>{{ auth.getCurrentUsername() }}</strong>
        </div>
        <button mat-menu-item (click)="auth.logout()">
          <mat-icon matListItemIcon>logout</mat-icon>
          Logout
        </button>
      </mat-menu>
    </mat-toolbar>

    <div class="main-content">
      <router-outlet></router-outlet>
    </div>

    <div class="footer">
      <span>IRIS workshop demo webapp</span>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
